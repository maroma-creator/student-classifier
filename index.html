<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام متابعة الطلاب</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --sf: #161b22;
      --card: #1c2333;
      --bd: #30363d;
      --pri: #58a6ff;
      --pl: rgba(88, 166, 255, .12);
      --gr: #3fb950;
      --gl: rgba(63, 185, 80, .12);
      --or: #d29922;
      --ol: rgba(210, 153, 34, .12);
      --re: #f85149;
      --rl: rgba(248, 81, 73, .12);
      --pu: #bc8cff;
      --pul: rgba(188, 140, 255, .12);
      --cy: #38bdf8;
      --cyl: rgba(56, 189, 248, .12);
      --ye: #fbbf24;
      --yel: rgba(251, 191, 36, .12);
      --tx: #e6edf3;
      --mu: #8b949e;
      --mu2: #6e7681;
      --sh: 0 1px 8px rgba(0, 0, 0, .5);
      --shm: 0 6px 24px rgba(0, 0, 0, .6);
      --r: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--tx);
      min-height: 100vh;
      font-size: 14px;
    }

    #LP {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #1a2744 0%, #0d1117 70%);
      padding: 20px;
    }

    .lcard {
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 390px;
      box-shadow: var(--shm);
      animation: popUp .4s cubic-bezier(.34, 1.56, .64, 1);
    }

    @keyframes popUp {
      from { transform: scale(.88); opacity: 0 }
      to { transform: scale(1); opacity: 1 }
    }

    .llogo { text-align: center; margin-bottom: 24px; }
    .llogo .li { font-size: 48px; display: block; margin-bottom: 8px; }
    .llogo h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--pri), var(--gr));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .llogo p { font-size: 12px; color: var(--mu); margin-top: 2px; }

    .rrow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .rc {
      border: 2px solid var(--bd);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: .2s;
      background: var(--sf);
    }
    .rc:hover, .rc.on { border-color: var(--pri); background: var(--pl); }
    .rc .ri { font-size: 26px; display: block; margin-bottom: 4px; }
    .rc .rn { font-size: 12px; font-weight: 700; color: var(--tx); }

    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; color: var(--mu); margin-bottom: 5px; letter-spacing: .5px; }
    .fg input, .fg select {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--bd);
      border-radius: 9px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      color: var(--tx);
      background: var(--sf);
      outline: none;
      transition: .2s;
    }
    .fg input:focus, .fg select:focus { border-color: var(--pri); box-shadow: 0 0 0 3px rgba(88, 166, 255, .15); }
    .fg select option { background: var(--sf); }

    .btnL {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--pri), #1f6feb);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      margin-top: 4px;
    }
    .btnL:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(88, 166, 255, .4); }
    .lhint { text-align: center; font-size: 11px; color: var(--mu2); margin-top: 10px; }

    #app { display: none; min-height: 100vh; flex-direction: column; }

    .hdr {
      background: var(--sf);
      border-bottom: 1px solid var(--bd);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: var(--sh);
    }

    .hbrand { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .hbrand h1 {
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 900;
      background: linear-gradient(90deg, var(--pri), var(--gr));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bc { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--mu); }
    .bcl { cursor: pointer; color: var(--mu); transition: .2s; }
    .bcl:hover { color: var(--pri); }

    .hright { display: flex; align-items: center; gap: 10px; }

    .avbtn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--bd);
      transition: .2s;
      background: var(--pl);
    }
    .avbtn:hover { border-color: var(--pri); }
    .avbtn img { width: 100%; height: 100%; object-fit: cover; }

    .bsm {
      background: none;
      border: 1.5px solid var(--bd);
      border-radius: 7px;
      padding: 4px 11px;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 11px;
      color: var(--mu);
      transition: .2s;
    }
    .bsm:hover { border-color: var(--re); color: var(--re); }

    .nw { position: relative; cursor: pointer; }
    .nbg {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--re);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--sf);
    }
    .np {
      position: absolute;
      top: 40px;
      left: 0;
      width: 300px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shm);
      border: 1px solid var(--bd);
      z-index: 400;
      display: none;
      max-height: 340px;
      overflow-y: auto;
    }
    .np.open { display: block; animation: fd .2s ease; }

    @keyframes fd {
      from { transform: translateY(-8px); opacity: 0 }
      to { transform: translateY(0); opacity: 1 }
    }

    .nph { padding: 10px 14px; border-bottom: 1px solid var(--bd); font-weight: 700; font-size: 12px; color: var(--mu); }
    .ni { padding: 10px 14px; border-bottom: 1px solid var(--bd); display: flex; gap: 8px; }
    .ni:last-child { border-bottom: none; }
    .nd { width: 6px; height: 6px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .nd-r { background: var(--re); }
    .nd-o { background: var(--or); }
    .nt { font-size: 11px; line-height: 1.5; color: var(--tx); }

    .abody { display: flex; flex: 1; min-height: 0; }

    .sb {
      width: 196px;
      background: var(--sf);
      border-left: 1px solid var(--bd);
      flex-shrink: 0;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .si {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--mu);
      transition: .2s;
      border: none;
      background: none;
      width: 100%;
      text-align: right;
    }
    .si:hover { background: var(--card); color: var(--tx); }
    .si.on { background: var(--pl); color: var(--pri); }
    .si .ic { font-size: 15px; flex-shrink: 0; }

    .sdv { height: 1px; background: var(--bd); margin: 6px 4px; }

    .main { flex: 1; padding: 20px; overflow-y: auto; }

    .card {
      background: var(--card);
      border-radius: var(--r);
      padding: 18px;
      border: 1px solid var(--bd);
      margin-bottom: 14px;
    }

    .ch {
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--tx);
    }

    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 11px; }

    .stat {
      background: var(--sf);
      border-radius: 10px;
      padding: 14px;
      border: 1px solid var(--bd);
      text-align: center;
    }
    .stat .sv { font-size: 26px; font-weight: 900; font-family: 'Cairo', sans-serif; }
    .stat .sl { font-size: 10px; color: var(--mu); font-weight: 600; margin-top: 2px; }
    .s-b .sv { color: var(--pri); }
    .s-g .sv { color: var(--gr); }
    .s-o .sv { color: var(--or); }
    .s-r .sv { color: var(--re); }
    .s-p .sv { color: var(--pu); }
    .s-c .sv { color: var(--cy); }

    .badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      display: inline-block;
    }
    .bAp { background: var(--pul); color: var(--pu); }
    .bA  { background: var(--pl);  color: var(--pri); }
    .bB  { background: var(--cyl); color: var(--cy); }
    .bC  { background: var(--gl);  color: var(--gr); }
    .bD  { background: var(--ol);  color: var(--or); }
    .bF  { background: var(--rl);  color: var(--re); }

    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--bd); margin-bottom: 16px; overflow-x: auto; }
    .tab {
      padding: 8px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--mu);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: .2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--tx); }
    .tab.on { color: var(--pri); border-bottom-color: var(--pri); }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: 'Tajawal', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-p { background: var(--pri); color: #0d1117; }
    .btn-p:hover { box-shadow: 0 4px 14px rgba(88, 166, 255, .4); }
    .btn-g { background: var(--gr); color: #0d1117; }
    .btn-g:hover { box-shadow: 0 4px 14px rgba(63, 185, 80, .4); }
    .btn-gh { background: var(--sf); color: var(--mu); border: 1.5px solid var(--bd); }
    .btn-gh:hover { border-color: var(--pri); color: var(--pri); }
    .btn-r { background: var(--rl); color: var(--re); border: 1px solid var(--re); }
    .btn-r:hover { background: var(--re); color: #fff; }

    .btn-xs {
      padding: 4px 9px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      transition: .2s;
    }
    .bx-a { background: var(--pl); color: var(--pri); }
    .bx-a:hover { background: var(--pri); color: #fff; }
    .bx-r { background: var(--rl); color: var(--re); }
    .bx-r:hover { background: var(--re); color: #fff; }
    .bx-e { background: var(--ol); color: var(--or); }
    .bx-e:hover { background: var(--or); color: #fff; }

    .bsave {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--pri), #1f6feb);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
      margin-top: 10px;
    }
    .bsave:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(88, 166, 255, .35); }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl th {
      text-align: right;
      padding: 8px 11px;
      font-size: 10px;
      font-weight: 700;
      color: var(--mu);
      border-bottom: 2px solid var(--bd);
      text-transform: uppercase;
      letter-spacing: .5px;
      white-space: nowrap;
    }
    .tbl td { padding: 9px 11px; border-bottom: 1px solid var(--bd); font-size: 12px; vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: rgba(255, 255, 255, .02); }

    .al {
      padding: 10px 13px;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .al-d { background: var(--rl); color: var(--re); border-right: 3px solid var(--re); }
    .al-w { background: var(--ol); color: var(--or); border-right: 3px solid var(--or); }
    .al-b { background: var(--pl); color: var(--pri); border-right: 3px solid var(--pri); }
    .al-g { background: var(--gl); color: var(--gr); border-right: 3px solid var(--gr); }

    .pw { background: var(--bd); border-radius: 20px; height: 7px; overflow: hidden; }
    .pb { height: 100%; border-radius: 20px; transition: width .8s ease; }

    .csel { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .csb {
      padding: 7px 15px;
      border: 2px solid var(--bd);
      border-radius: 20px;
      background: var(--sf);
      color: var(--mu);
      font-family: 'Tajawal', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    .csb:hover { border-color: var(--pri); color: var(--pri); }
    .csb.on { border-color: var(--pri); background: var(--pl); color: var(--pri); }

    .sin {
      width: 58px;
      padding: 5px;
      border: 2px solid var(--bd);
      border-radius: 7px;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      color: var(--pri);
      outline: none;
      background: var(--bg);
      transition: .2s;
    }
    .sin:focus { border-color: var(--pri); }
    .sin.warn { border-color: var(--re) !important; }

    .calcbox { background: var(--sf); border-radius: 11px; padding: 14px; border: 1.5px solid var(--bd); margin-bottom: 10px; }
    .calcbox .cb-hdr { font-weight: 700; font-size: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .calcbox .cb-result { font-size: 22px; font-weight: 900; font-family: 'Cairo', sans-serif; text-align: center; margin-top: 10px; }

    .chero {
      background: linear-gradient(135deg, #0e1c36, #0d2016);
      border-radius: var(--r);
      padding: 22px;
      margin-bottom: 14px;
      border: 1px solid var(--bd);
    }
    .chero h2 { font-family: 'Cairo', sans-serif; font-size: 20px; font-weight: 900; color: var(--tx); }
    .chero p { font-size: 12px; color: var(--mu); margin-top: 4px; }
    .cmeta { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
    .cmeta span { font-size: 11px; color: var(--mu); }

    .de-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--bd); }
    .de-row:last-child { border-bottom: none; }
    .de-lbl { flex: 1; font-size: 13px; font-weight: 600; }
    .de-inp {
      width: 60px;
      padding: 5px 8px;
      border: 1.5px solid var(--bd);
      border-radius: 7px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      color: var(--pri);
      outline: none;
      background: var(--sf);
    }
    .de-inp:focus { border-color: var(--pri); }
    .de-bar { flex: 2; background: var(--bd); border-radius: 20px; height: 6px; overflow: hidden; }
    .de-fill { height: 100%; border-radius: 20px; transition: width .4s; }

    .phero {
      background: linear-gradient(135deg, #0e1c36, #0d2016);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 14px;
      border: 1px solid var(--bd);
    }

    .avup {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid rgba(88, 166, 255, .3);
      position: relative;
      flex-shrink: 0;
      background: var(--pl);
    }
    .avup img { width: 100%; height: 100%; object-fit: cover; }
    .avup .ov {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: .2s;
      font-size: 18px;
    }
    .avup:hover .ov { opacity: 1; }

    .ef { margin-bottom: 12px; }
    .ef label { display: block; font-size: 11px; font-weight: 700; color: var(--mu); margin-bottom: 4px; letter-spacing: .5px; }
    .ef input, .ef textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      color: var(--tx);
      background: var(--sf);
      outline: none;
      transition: .2s;
    }
    .ef input:focus { border-color: var(--pri); }

    .stud-header {
      background: linear-gradient(135deg, #0e1c36, #1a0e36);
      border-radius: var(--r);
      padding: 20px;
      border: 1px solid var(--bd);
      margin-bottom: 14px;
    }

    .lang-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .lbtn {
      flex: 1;
      padding: 6px;
      border: 1.5px solid var(--bd);
      border-radius: 8px;
      background: none;
      color: var(--mu);
      font-family: 'Tajawal', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s;
    }
    .lbtn.on { border-color: var(--pri); background: var(--pl); color: var(--pri); }

    .s-y .sv { color: var(--ye); }

    .hidden { display: none !important; }
    .flex { display: flex; }
    .gap8 { gap: 8px; }
    .gap12 { gap: 12px; }
    .ai-c { align-items: center; }
    .jb { justify-content: space-between; }
    .mt12 { margin-top: 12px; }
    .mb12 { margin-bottom: 12px; }
    .mb16 { margin-bottom: 16px; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--pl);
      color: var(--pri);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      margin: 2px;
    }

    @media(max-width:768px) {
      .sb { display: none; }
      .g2, .g3, .g4 { grid-template-columns: 1fr; }
      .main { padding: 12px; }
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="LP">
    <div class="lcard">
      <div class="llogo">
        <span class="li">🎓</span>
        <h1>نظام متابعة الطلاب</h1>
        <p>Academic Monitoring System</p>
      </div>
      <div class="rrow">
        <div class="rc on" onclick="pickRole('doctor')" id="rDoc"><span class="ri">👨‍🏫</span>
          <div class="rn">دكتور</div>
        </div>
        <div class="rc" onclick="pickRole('student')" id="rStud"><span class="ri">👨‍🎓</span>
          <div class="rn">طالب</div>
        </div>
      </div>
      <div class="fg"><label>اسم المستخدم</label>
        <input id="lUsr" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="fg"><label>كلمة المرور</label>
        <input type="password" id="lPwd" placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btnL" onclick="doLogin()">دخول ←</button>
      <p class="lhint">دكتور: admin / 1234 &nbsp;|&nbsp; طالب: 231100164 / 0000</p>
      <p class="lhint" style="margin-top:5px;color:#38bdf8">🔵 ممتاز: 999001&nbsp;/&nbsp;0000 &nbsp;|&nbsp; 🟡 متوسط: 999002&nbsp;/&nbsp;0000</p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="hdr">
      <div class="flex ai-c gap12">
        <div class="hbrand" onclick="goHome()"><span style="font-size:22px">🎓</span>
          <h1 id="A_ttl">نظام متابعة الطلاب</h1>
        </div>
        <div class="bc" id="BC"></div>
      </div>
      <div class="hright">
        <div class="nw" onclick="toggleNotif()" id="NW">
          <span style="font-size:19px">🔔</span>
          <div class="nbg" id="NB">0</div>
          <div class="np" id="NP">
            <div class="nph">الإشعارات</div>
            <div id="NL"></div>
          </div>
        </div>
        <div class="avbtn" onclick="goTab('profile')">
          <img id="HAV" src=""

    function buildCS101Grades() {

    function genQuizScores(maxes, seed) {
      const rand = seededRand(seed);
      const tier = rand() < 0.15 ? 0 : rand() < 0.30 ? 1 : rand() < 0.60 ? 2 : 3;
      return maxes.map(mx => {
        let base;
        if (tier === 0) base = rand() * 0.45;
        else if (tier === 1) base = 0.45 + rand() * 0.25;
        else if (tier === 2) base = 0.65 + rand() * 0.25;
        else base = 0.82 + rand() * 0.18;
        return Math.round(clamp(base * mx, 0, mx));
      });
    }
    function genHwScores(maxes, seed) {
      const rand = seededRand(seed + 99999);
      const tier = rand() < 0.12 ? 0 : rand() < 0.28 ? 1 : rand() < 0.60 ? 2 : 3;
      return maxes.map(mx => {
        let base;
        if (tier === 0) base = rand() * 0.45;
        else if (tier === 1) base = 0.45 + rand() * 0.25;
        else if (tier === 2) base = 0.65 + rand() * 0.25;
        else base = 0.82 + rand() * 0.18;
        return Math.round(clamp(base * mx, 0, mx));
      });
    }
    function genMid(max, seed) {
      const rand = seededRand(seed + 77777);
      const tier = rand() < 0.12 ? 0 : rand() < 0.28 ? 1 : rand() < 0.60 ? 2 : 3;
      let base;
      if (tier === 0) base = rand() * 0.45;
      else if (tier === 1) base = 0.45 + rand() * 0.25;
      else if (tier === 2) base = 0.65 + rand() * 0.25;
      else base = 0.82 + rand() * 0.18;
      return Math.round(clamp(base * max, 0, max));
    }
    function genProj(max, seed) {
      const rand = seededRand(seed + 55555);
      const tier = rand() < 0.10 ? 0 : rand() < 0.25 ? 1 : rand() < 0.60 ? 2 : 3;
      let base;
      if (tier === 0) base = rand() * 0.45;
      else if (tier === 1) base = 0.45 + rand() * 0.25;
      else if (tier === 2) base = 0.65 + rand() * 0.25;
      else base = 0.82 + rand() * 0.18;
      return Math.round(clamp(base * max, 0, max));
    }

    function buildMATH201Grades(users) {
      const sc = { quizMaxes: [20, 10], quizWeight: 20, hwMaxes: [20, 15], hwWeight: 20, midMax: 20, midWeight: 30, projMax: 100, projWeight: 30 };

          mid: genMid(sc.midMax, seed),
          proj: genProj(sc.projMax, seed)

      return grades;
    }

    // ═══ STATE ═══
    let CU = null, lang = 'ar', loginRole = 'doctor', activeC = null;

    const GRADES = [
      { g: 'A+', min: 95, cls: 'bAp' },
      { g: 'A',  min: 90, cls: 'bA'  },
      { g: 'B',  min: 80, cls: 'bB'  },

    ];

    // ═══ SCORE ENGINE ═══
    function getG(cid, sid) {
      const c = DB.courses.find(c => c.id === cid);
      return c ? (c.grades[sid] || { quizzes: [], hws: [], mid: null, proj: null }) : { quizzes: [], hws: [], mid: null, proj: null };
    }

    function qMaxes(sc) { return sc.quizMaxes || Array(sc.quizCount || 0).fill(sc.quizMax || 20); }
    function hMaxes(sc) { return sc.hwMaxes || Array(sc.hwCount || 0).fill(sc.hwMax || 20); }

    function calcSection(cid, sid, section) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return 0;
      const g = getG(cid, sid); const sc = c.schema;
      if (section === 'quiz') {
        const maxes = qMaxes(sc);
        const valid = g.quizzes.map((v, i) => v != null ? { v, max: maxes[i] || 5 } : null).filter(Boolean);
        if (!valid.length) return 0;
        const contrib = valid.reduce((a, { v, max }) => a + (v / max), 0) / maxes.length;
        return Math.round(contrib * sc.quizWeight * 10) / 10;
      }
      if (section === 'hw') {
        const maxes = hMaxes(sc);
        const valid = g.hws.map((v, i) => v != null ? { v, max: maxes[i] || 20 } : null).filter(Boolean);
        if (!valid.length) return 0;
        const contrib = valid.reduce((a, { v, max }) => a + (v / max), 0) / maxes.length;
        return Math.round(contrib * sc.hwWeight * 10) / 10;
      }
      if (section === 'mid') {
        if (g.mid == null) return 0;
        return Math.round((g.mid / sc.midMax) * sc.midWeight * 10) / 10;
      }
      if (section === 'proj') {
        if (g.proj == null) return 0;
        return Math.round((g.proj / sc.projMax) * sc.projWeight * 10) / 10;
      }
      return 0;
    }

    function calcTotal(cid, sid) {
      return Math.round((
        calcSection(cid, sid, 'quiz') +
        calcSection(cid, sid, 'hw') +
        calcSection(cid, sid, 'mid') +
        calcSection(cid, sid, 'proj')
      ) * 10) / 10;
    }

    // ═══ MAX POSSIBLE SCORE (assuming perfect on all null/ungraded entries) ═══
    function calcMaxPossible(cid, sid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return 100;
      const g = getG(cid, sid); const sc = c.schema;
      const qm = qMaxes(sc); const hm = hMaxes(sc);

      // Quiz: treat null as 1.0 (perfect ratio)
      const qPoss = qm.reduce((a, mx, i) => {
        const v = g.quizzes?.[i];
        return a + (v != null ? v / mx : 1);
      }, 0) / qm.length * sc.quizWeight;

      // HW: treat null as 1.0
      const hPoss = hm.reduce((a, mx, i) => {
        const v = g.hws?.[i];
        return a + (v != null ? v / mx : 1);
      }, 0) / hm.length * sc.hwWeight;

      // Mid: if null assume full weight
      const mPoss = g.mid != null ? (g.mid / sc.midMax) * sc.midWeight : sc.midWeight;

      // Proj: if null assume full weight
      const pPoss = g.proj != null ? (g.proj / sc.projMax) * sc.projWeight : sc.projWeight;

      return Math.round((qPoss + hPoss + mPoss + pPoss) * 10) / 10;
    }

    function getGr(score) { return GRADES.find(g => score >= g.min) || GRADES[GRADES.length - 1]; }

    function getWarnings(cid, sid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return [];
      const g = getG(cid, sid); const sc = c.schema; const w = [];
      const qm = qMaxes(sc), hm = hMaxes(sc);
      g.quizzes.forEach((v, i) => { if (v != null && v < (qm[i] || 5) * 0.5) w.push(`CE${i + 1}: ${v}/${qm[i] || 5}`); });
      g.hws.forEach((v, i) => { if (v != null && v < (hm[i] || 20) * 0.5) w.push(`HW${i + 1}: ${v}/${hm[i] || 20}`); });
      if (g.mid != null && g.mid < sc.midMax * 0.5) w.push(`Mid: ${g.mid}/${sc.midMax}`);
      return w;
    }

    function normalStats(scores) {
      if (!scores.length) return { mean: 0, std: 0, above: 0, at: 0, below: 0, shape: '—' };
      const mean = scores.reduce((a, b) => a + b, 0) / scores.length;
      const std = Math.sqrt(scores.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / scores.length);
      let above = 0, at = 0, below = 0;
      scores.forEach(s => { if (s > mean + 5) above++; else if (s < mean - 5) below++; else at++; });
      const shape = above > below && above > at ? 'Skewed Left — الفصل ممتاز 🎉'
        : below > above && below > at ? 'Skewed Right — مستوى منخفض ⚠️'
        : 'Bell Curve — توزيع طبيعي ✅';
      return { mean: Math.round(mean * 10) / 10, std: Math.round(std * 10) / 10, above, at, below, shape };
    }

    function riskAnalysis(cid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return null;
      const studs = courseStudents(cid); if (!studs.length) return null;
      let atRisk = 0;
      const details = studs.map(s => {
        const w = getWarnings(cid, s.id); const flagged = w.length > 0;
        if (flagged) atRisk++;
        const tot = calcTotal(cid, s.id); const gr = getGr(tot);
        return { name: s.name, id: s.id, flagged, w, tot, gr };
      });
      const pF = Math.round(atRisk / studs.length * 100) / 100;
      return { details, atRisk, pF, critical: pF > 0.4, n: studs.length };
    }

    // ═══ HELPERS ═══
    function courseStudents(cid) { return DB.users.filter(u => u.role === 'student' && u.courses.includes(cid)); }

    // ═══ BELL CURVE ═══
    function drawBell(cid) {
      const canvas = document.getElementById('BC_' + cid); if (!canvas) return;
      const scores = courseStudents(cid).map(s => calcTotal(cid, s.id));
      const W = canvas.offsetWidth || 500; canvas.width = W; canvas.height = 150;
      const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, W, 150);
      if (scores.length < 2) {
        ctx.fillStyle = '#8b949e'; ctx.font = '12px Tajawal';
        ctx.textAlign = 'center'; ctx.fillText('أضف طلاباً لرسم التوزيع', W / 2, 75);
        return;
      }
      const st = normalStats(scores); if (!st.std) return;
      const gauss = x => Math.exp(-.5 * Math.pow((x - st.mean) / st.std, 2));
      const pts = Array.from({ length: 300 }, (_, i) => { const x = i / 299 * 100; return { x, y: gauss(x) }; });
      const my = Math.max(...pts.map(p => p.y));
      const tx = x => (x / 100) * W, ty = y => 143 - (y / my) * 132;
      [[0, 60, 'rgba(248,81,73,.1)'], [60, 70, 'rgba(210,153,34,.1)'], [70, 80, 'rgba(56,189,248,.1)'], [80, 90, 'rgba(63,185,80,.1)'], [90, 100, 'rgba(188,140,255,.12)']].forEach(([f, t, c]) => {
        const zp = pts.filter(p => p.x >= f && p.x <= t); if (!zp.length) return;
        ctx.beginPath(); ctx.moveTo(tx(zp[0].x), ty(zp[0].y));
        zp.forEach(p => ctx.lineTo(tx(p.x), ty(p.y)));
        ctx.lineTo(tx(zp[zp.length - 1].x), 143); ctx.lineTo(tx(zp[0].x), 143);
        ctx.closePath(); ctx.fillStyle = c; ctx.fill();
      });
      [60, 70, 80, 90].forEach((th, i) => {
        ctx.beginPath(); ctx.moveTo(tx(th), 2); ctx.lineTo(tx(th), 143);
        ctx.strokeStyle = ['#f85149', '#d29922', '#38bdf8', '#bc8cff'][i];
        ctx.lineWidth = 1; ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]);
      });
      const gr = ctx.createLinearGradient(0, 0, W, 0);
      gr.addColorStop(0, 'rgba(248,81,73,.9)'); gr.addColorStop(.4, 'rgba(210,153,34,.9)');
      gr.addColorStop(.75, 'rgba(63,185,80,.9)'); gr.addColorStop(1, 'rgba(188,140,255,.9)');
      ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(tx(p.x), ty(p.y)) : ctx.moveTo(tx(p.x), ty(p.y)));
      ctx.strokeStyle = gr; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();
      scores.forEach(sc => {
        ctx.beginPath(); ctx.arc(tx(sc), ty(gauss(sc)) - 6, 4, 0, Math.PI * 2);
        ctx.fillStyle = GC[getGr(sc).g]; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 1.5; ctx.stroke();
      });
      ctx.beginPath(); ctx.moveTo(tx(st.mean), 2); ctx.lineTo(tx(st.mean), 143);
      ctx.strokeStyle = 'rgba(88,166,255,.4)'; ctx.lineWidth = 2; ctx.setLineDash([5, 4]); ctx.stroke(); ctx.setLineDash([]);
    }

      const usr = document.getElementById('lUsr').value.trim();
      const pwd = document.getElementById('lPwd').value;
      const u = DB.users.find(u => u.id === usr && u.pwd === pwd && u.role === loginRole);
      if (!u) { alert('بيانات غير صحيحة'); return; }
      CU = u; activeC = myCourses()[0]?.id || null; showApp();
    }
    function doLogout() {
      CU = null; activeC = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('LP').style.display = 'flex';
      document.getElementById('lPwd').value = '';
    }
    function showApp() {
      document.getElementById('LP').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('HAV').src = CU.avatar || '';
      buildSB(); buildNotifs(); goHome();
    }
    function goHome() { goTab('dash'); }

    // ═══ SHELL ═══
    function buildSB() {
      const isDoc = CU.role === 'doctor';
      const items = isDoc ? [
        { id: 'dash',     ic: '📊', lb: 'لوحة التحكم' },
        { id: 'grades',   ic: '✏️', lb: 'إدخال الدرجات' },
        { id: 'students', ic: '👥', lb: 'الطلاب' },
        { id: 'schema',   ic: '⚖️', lb: 'توزيع الدرجات' },
        'div',
        { id: 'alerts',   ic: '🚨', lb: 'التنبيهات' },
        { id: 'report',   ic: '📋', lb: 'التقرير' },
        'div',
        { id: 'profile',  ic: '👤', lb: 'ملفي الشخصي' },
      ] : [
        { id: 'dash',    ic: '🏠', lb: 'الرئيسية' },
        { id: 'grades',  ic: '📊', lb: 'درجاتي' },
        { id: 'recs',    ic: '💡', lb: 'التوصيات' },
        'div',
        { id: 'profile', ic: '👤', lb: 'ملفي الشخصي' },
      ];

        if (it === 'div') return '<div class="sdv"></div>';
        return `<button class="si" id="sb-${it.id}" onclick="goTab('${it.id}')"><span class="ic">${it.ic}</span>${it.lb}</button>`;
      }).join('');

    function markTab(id) {
      document.querySelectorAll('.si').forEach(b => b.classList.remove('on'));
      const el = document.getElementById('sb-' + id); if (el) el.classList.add('on');
    }

    function goTab(tab) {
      markTab(tab);
      const mn = document.getElementById('MN');
      if (CU.role === 'doctor') {
        if (tab === 'dash')     { setBc([{ lb: 'لوحة التحكم' }]);    mn.innerHTML = buildDocDash();    setTimeout(() => myCourses().forEach(c => drawBell(c.id)), 60); }
        else if (tab === 'grades')   { setBc([{ lb: 'إدخال الدرجات' }]); mn.innerHTML = buildGradeEntry(); }
        else if (tab === 'students') { setBc([{ lb: 'الطلاب' }]);         mn.innerHTML = buildDocStudents(); }
        else if (tab === 'schema')   { setBc([{ lb: 'توزيع الدرجات' }]);  mn.innerHTML = buildSchema(); }
        else if (tab === 'alerts')   { setBc([{ lb: 'التنبيهات' }]);      mn.innerHTML = buildAlerts(); }
        else if (tab === 'report')   { setBc([{ lb: 'التقرير' }]);        mn.innerHTML = buildReport(); setTimeout(() => myCourses().forEach(c => drawBell(c.id)), 60); }
        else if (tab === 'profile')  { setBc([{ lb: 'ملفي الشخصي' }]);   mn.innerHTML = buildProfile(); }

        if (tab === 'dash')    { setBc([{ lb: 'الرئيسية' }]);    mn.innerHTML = buildStudDash(); }
        else if (tab === 'grades')  { setBc([{ lb: 'درجاتي' }]);   mn.innerHTML = buildStudGradesPage(); }
        else if (tab === 'recs')    { setBc([{ lb: 'التوصيات' }]);  mn.innerHTML = buildRecsPage(); }
        else if (tab === 'profile') { setBc([{ lb: 'ملفي الشخصي' }]); mn.innerHTML = buildProfile(); }

        `<button class="csb ${c.id === activeC ? 'on' : ''}" onclick="${selFn}('${c.id}')">${c.name}</button>`

    // ═══ DOCTOR: DASHBOARD ═══
    function buildDocDash() {

      return `

        <div style="background:var(--pl);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:22px;font-weight:900;font-family:Cairo,sans-serif;color:var(--pri)">${st.at}</div>

        <div style="background:var(--rl);border-radius:8px;padding:10px;text-align:center">

        </div>
      </div>
      <div style="margin-top:8px;padding:8px 12px;background:var(--sf);border-radius:8px;font-size:12px;display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between">
        <span>Mean: <b style="color:var(--pri)">${st.mean}</b></span>
        <span>Std: <b style="color:var(--pri)">${st.std}</b></span>
        <span style="color:${st.shape.includes('🎉') ? 'var(--gr)' : st.shape.includes('⚠️') ? 'var(--re)' : 'var(--pri)'};font-weight:700">${st.shape}</span>
      </div>
    </div>
    <div>
      ${risk ? `<div class="card mb12">
        <div class="ch">🔬 Risk Analysis</div>
        <div style="padding:10px 14px;border-radius:9px;${risk.critical ? 'background:var(--rl)' : 'background:var(--gl)'};margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;color:${risk.critical ? 'var(--re)' : 'var(--gr)'}">${risk.critical ? '🚨 CRITICAL: >40% at risk!' : '✅ Class Stable'}</div>
            <div style="font-size:11px;color:var(--mu)">p = ${risk.pF} | ${risk.atRisk}/${risk.n}</div>
          </div>
          <div style="font-size:28px;font-weight:900;font-family:Cairo,sans-serif;color:${risk.critical ? 'var(--re)' : 'var(--gr)'}">${Math.round(risk.pF * 100)}%</div>
        </div>
        ${risk.details.filter(d => d.flagged).slice(0, 3).map(d => `
          <div class="al al-d" style="margin-bottom:6px">⚠️
            <div><b>${d.name}</b> — ${d.w.slice(0, 2).join(', ')}
              <button class="btn-xs bx-a" style="margin-right:8px" onclick="viewStudent('${c.id}','${d.id}')">عرض</button>
            </div>
          </div>`).join('')}
      </div>` : ''}
      <div class="card">
        <div class="ch">⚡ التنبيهات <span style="font-size:10px;color:var(--mu);font-weight:400">(${alerts.length})</span></div>
        ${!alerts.length ? '<p style="text-align:center;color:var(--mu);padding:16px;font-size:13px">لا توجد تنبيهات 🎉</p>' :
          alerts.slice(0, 4).map(a => {
            const m = { fail: ['al-d', '🚨', 'خطر الرسوب'], drop: ['al-w', '📉', 'انخفاض'], warn: ['al-w', '⚠️', 'تحذير'] };
            const [cls, ic, lb] = m[a.type] || ['al-w', '⚠️', ''];
            return `<div class="al ${cls}">${ic}<div><b>${a.name}</b> — ${lb}<br><small>${a.detail}</small></div></div>`;

    function selDash(cid) { activeC = cid; goTab('dash'); }

    // ═══ DOCTOR: GRADE ENTRY ═══
    function buildGradeEntry() {
      const c = aC(); if (!c) return `<div class="card"><p style="color:var(--mu);padding:20px;text-align:center">لا توجد مقررات</p></div>`;
      const studs = courseStudents(c.id); const sc = c.schema;
      const qm = qMaxes(sc); const hm = hMaxes(sc);
      const tabs = ['quiz', 'hw', 'mid', 'proj'];
      const tabNames = {
        quiz: `CE Quizzes (${qm.length}×${qm[0]})`,
        hw: `HW (${hm.length}×${hm[0]})`,
        mid: 'Midterm',
        proj: 'Project'
      };
      const activeTab = window._gradeTab || 'quiz';

      let tableContent = '';
      if (activeTab === 'quiz') {
        tableContent = `<table class="tbl">
      <thead><tr><th>الطالب</th>${qm.map((mx, i) => `<th>CE${i + 1}/${mx}</th>`).join('')}<th>Weighted</th></tr></thead>
      <tbody>${studs.map(s => {
          const g = getG(c.id, s.id); const scores = g.quizzes || [];
          const weighted = calcSection(c.id, s.id, 'quiz');
          return `<tr>
          <td><b>${s.name}</b><div style="font-size:10px;color:var(--mu)">${s.id}</div></td>
          ${qm.map((mx, i) => `
            <td><input class="sin ${scores[i] != null && scores[i] < mx * 0.5 ? 'warn' : ''}" type="number"
              id="q_${s.id}_${i}" value="${scores[i] ?? ''}" min="0" max="${mx}"
              oninput="updateGradeRow('${c.id}','${s.id}')" style="width:50px">
            <div style="font-size:9px;color:var(--mu);text-align:center">/${mx}</div></td>`).join('')}
          <td id="qw_${s.id}" style="font-weight:700;color:var(--gr)">${weighted}</td>
        </tr>`;
        }).join('')}</tbody>
    </table>`;
      } else if (activeTab === 'hw') {
        tableContent = `<table class="tbl">
      <thead><tr><th>الطالب</th>${hm.map((mx, i) => `<th>HW${i + 1}/${mx}</th>`).join('')}<th>Weighted</th></tr></thead>
      <tbody>${studs.map(s => {
          const g = getG(c.id, s.id); const scores = g.hws || [];
          const weighted = calcSection(c.id, s.id, 'hw');
          return `<tr>
          <td><b>${s.name}</b><div style="font-size:10px;color:var(--mu)">${s.id}</div></td>
          ${hm.map((mx, i) => `
            <td><input class="sin ${scores[i] != null && scores[i] < mx * 0.5 ? 'warn' : ''}" type="number"
              id="h_${s.id}_${i}" value="${scores[i] ?? ''}" min="0" max="${mx}"
              oninput="updateGradeRow('${c.id}','${s.id}')" style="width:54px">
            <div style="font-size:9px;color:var(--mu);text-align:center">/${mx}</div></td>`).join('')}
          <td id="hw_${s.id}" style="font-weight:700;color:var(--gr)">${weighted}</td>
        </tr>`;
        }).join('')}</tbody>
    </table>`;
      } else if (activeTab === 'mid') {
        tableContent = `<table class="tbl">
      <thead><tr><th>الطالب</th><th>Midterm/${sc.midMax}</th><th>%</th><th>Weighted</th><th>Status</th></tr></thead>
      <tbody>${studs.map(s => {
          const g = getG(c.id, s.id); const mid = g.mid;
          const pct = mid != null ? Math.round(mid / sc.midMax * 100) : '-';
          const weighted = calcSection(c.id, s.id, 'mid');
          return `<tr>
          <td><b>${s.name}</b><div style="font-size:10px;color:var(--mu)">${s.id}</div></td>
          <td><input class="sin ${mid != null && mid < sc.midMax * 0.5 ? 'warn' : ''}" type="number"
            id="m_${s.id}" value="${mid ?? ''}" min="0" max="${sc.midMax}"
            oninput="updateGradeRow('${c.id}','${s.id}')" style="width:54px"></td>
          <td id="mp_${s.id}" style="color:var(--mu)">${pct !== '-' ? pct + '%' : '-'}</td>
          <td id="mw_${s.id}" style="font-weight:700;color:var(--gr)">${weighted}</td>
          <td>${mid != null ? (mid < sc.midMax * 0.5 ? '<span style="color:var(--re);font-size:10px">⚠️ Low</span>' : '<span style="color:var(--gr);font-size:10px">✅</span>') : '-'}</td>
        </tr>`;
        }).join('')}</tbody>
    </table>`;
      } else if (activeTab === 'proj') {
        tableContent = `<table class="tbl">
      <thead><tr><th>الطالب</th><th>Project/${sc.projMax}</th><th>%</th><th>Weighted</th><th>Total</th><th>Grade</th></tr></thead>
      <tbody>${studs.map(s => {
          const g = getG(c.id, s.id); const proj = g.proj;
          const pct = proj != null ? Math.round(proj / sc.projMax * 100) : '-';
          const weighted = calcSection(c.id, s.id, 'proj');
          const tot = calcTotal(c.id, s.id); const gr = getGr(tot);
          return `<tr>
          <td><b>${s.name}</b><div style="font-size:10px;color:var(--mu)">${s.id}</div></td>
          <td><input class="sin" type="number"
            id="p_${s.id}" value="${proj ?? ''}" min="0" max="${sc.projMax}"
            oninput="updateGradeRow('${c.id}','${s.id}')" style="width:64px"></td>
          <td id="pp_${s.id}" style="color:var(--mu)">${pct !== '-' ? pct + '%' : '-'}</td>
          <td id="pw_${s.id}" style="font-weight:700;color:var(--gr)">${weighted}</td>
          <td id="pt_${s.id}" style="font-weight:700;color:var(--pri)">${tot}</td>

      return `
  ${cSel('selGrades')}

    <div class="ch">✏️ إدخال الدرجات — ${c.name}</div>
    <div class="tabs">
      ${tabs.map(t => `<button class="tab ${activeTab === t ? 'on' : ''}" onclick="switchGradeTab('${t}')">${tabNames[t]}</button>`).join('')}
    </div>
    <div style="overflow-x:auto">${tableContent}</div>
    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
      <button class="btn btn-p" onclick="saveGrades('${c.id}')">💾 حفظ</button>
      <button class="btn btn-gh" onclick="goTab('students')">👁 عرض الطلاب</button>
    </div>
  </div>`;

    function switchGradeTab(t) { window._gradeTab = t; goTab('grades'); }
    function selGrades(cid) { activeC = cid; goTab('grades'); }

    function updateGradeRow(cid, sid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return;
      const sc = c.schema; const tab = window._gradeTab || 'quiz';
      const qm = qMaxes(sc); const hm = hMaxes(sc);
      if (tab === 'quiz') {
        const scores = qm.map((_, i) => { const v = document.getElementById(`q_${sid}_${i}`)?.value; return v === '' ? null : +v; });
        const valid = scores.map((v, i) => v != null ? { v, max: qm[i] } : null).filter(Boolean);
        const weighted = valid.length ? Math.round((valid.reduce((a, { v, max }) => a + (v / max), 0) / qm.length) * sc.quizWeight * 10) / 10 : 0;
        const ew = document.getElementById('qw_' + sid); if (ew) ew.textContent = weighted;
      } else if (tab === 'hw') {
        const scores = hm.map((_, i) => { const v = document.getElementById(`h_${sid}_${i}`)?.value; return v === '' ? null : +v; });
        const valid = scores.map((v, i) => v != null ? { v, max: hm[i] } : null).filter(Boolean);
        const weighted = valid.length ? Math.round((valid.reduce((a, { v, max }) => a + (v / max), 0) / hm.length) * sc.hwWeight * 10) / 10 : 0;
        const ew = document.getElementById('hw_' + sid); if (ew) ew.textContent = weighted;
      } else if (tab === 'mid') {
        const v = document.getElementById(`m_${sid}`)?.value; const mid = v === '' ? null : +v;
        const pct = mid != null ? Math.round(mid / sc.midMax * 100) + '%' : '-';
        const weighted = mid != null ? Math.round((mid / sc.midMax) * sc.midWeight * 10) / 10 : 0;
        const ep = document.getElementById('mp_' + sid); if (ep) ep.textContent = pct;
        const ew = document.getElementById('mw_' + sid); if (ew) ew.textContent = weighted;
      } else if (tab === 'proj') {
        const v = document.getElementById(`p_${sid}`)?.value; const proj = v === '' ? null : +v;
        const pct = proj != null ? Math.round(proj / sc.projMax * 100) + '%' : '-';
        const weighted = proj != null ? Math.round((proj / sc.projMax) * sc.projWeight * 10) / 10 : 0;
        const ep = document.getElementById('pp_' + sid); if (ep) ep.textContent = pct;
        const ew = document.getElementById('pw_' + sid); if (ew) ew.textContent = weighted;
      }
    }

    function saveGrades(cid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return;
      const sc = c.schema; const tab = window._gradeTab || 'quiz';
      const qm = qMaxes(sc); const hm = hMaxes(sc);
      courseStudents(cid).forEach(s => {
        if (!c.grades[s.id]) c.grades[s.id] = { quizzes: [], hws: [], mid: null, proj: null };
        if (tab === 'quiz') {
          c.grades[s.id].quizzes = qm.map((mx, i) => { const v = document.getElementById(`q_${s.id}_${i}`)?.value; return v === '' ? null : Math.min(+v, mx); });
        } else if (tab === 'hw') {
          c.grades[s.id].hws = hm.map((mx, i) => { const v = document.getElementById(`h_${s.id}_${i}`)?.value; return v === '' ? null : Math.min(+v, mx); });
        } else if (tab === 'mid') {
          const v = document.getElementById(`m_${s.id}`)?.value;
          c.grades[s.id].mid = v === '' ? null : Math.min(+v, sc.midMax);
        } else if (tab === 'proj') {
          const v = document.getElementById(`p_${s.id}`)?.value;
          c.grades[s.id].proj = v === '' ? null : Math.min(+v, sc.projMax);
        }
      });
      buildNotifs();
      const btn = document.querySelector(`button[onclick="saveGrades('${cid}')"]`);
      if (btn) { btn.textContent = '✅ تم!'; btn.style.background = 'var(--gr)'; setTimeout(() => { btn.textContent = '💾 حفظ'; btn.style.background = ''; }, 2000); }
    }

    function saveSchema(cid) {
      const c = DB.courses.find(c => c.id === cid); if (!c) return;
      const qc = +document.getElementById('sc_qc').value || 1;
      const hc = +document.getElementById('sc_hc').value || 1;
      const qw = +document.getElementById('sc_qw').value || 0;
      const hw = +document.getElementById('sc_hw').value || 0;
      const mm = +document.getElementById('sc_mm').value || 20;
      const mw = +document.getElementById('sc_mw').value || 0;
      const pm = +document.getElementById('sc_pm').value || 100;
      const pw = +document.getElementById('sc_pw').value || 0;
      if (qw + hw + mw + pw !== 100) { alert('مجموع الأوزان يجب أن يكون 100%'); return; }
      const newQMaxes = Array.from({ length: qc }, (_, i) => +document.getElementById('sc_qm_' + i)?.value || 5);
      const newHMaxes = Array.from({ length: hc }, (_, i) => +document.getElementById('sc_hm_' + i)?.value || 20);
      Object.values(c.grades).forEach(g => {
        while ((g.quizzes || []).length < qc) g.quizzes = (g.quizzes || []).concat([null]);
        g.quizzes = (g.quizzes || []).slice(0, qc);
        while ((g.hws || []).length < hc) g.hws = (g.hws || []).concat([null]);
        g.hws = (g.hws || []).slice(0, hc);
      });
      c.schema = { quizMaxes: newQMaxes, quizWeight: qw, hwMaxes: newHMaxes, hwWeight: hw, midMax: mm, midWeight: mw, projMax: pm, projWeight: pw };
      alert('✅ تم حفظ التوزيع!'); goTab('schema');

        const quizScores = (g.quizzes || []).filter(v => v != null).map((v, i) => Math.round(v / (qMaxes(sc)[i] || 5) * 100));
        const hwScores = (g.hws || []).filter(v => v != null).map((v, i) => Math.round(v / (hMaxes(sc)[i] || 20) * 100));
        const allScores = [...quizScores, ...hwScores,
          g.mid != null ? Math.round(g.mid / sc.midMax * 100) : null,
          g.proj != null ? Math.round(g.proj / sc.projMax * 100) : null
        ].filter(v => v != null);
        if (!allScores.length) { ctx.fillStyle = '#8b949e'; ctx.font = '11px Tajawal'; ctx.textAlign = 'center'; ctx.fillText('لا توجد درجات بعد', W / 2, 70); return; }
        const labels = [
          ...quizScores.map((_, i) => `CE${i + 1}`),
          ...hwScores.map((_, i) => `HW${i + 1}`),
          g.mid != null ? 'Mid' : null,
          g.proj != null ? 'Proj' : null
        ].filter(v => v != null);
        const n = allScores.length; const bw = (W - 20) / n; const maxH = 110;
        ctx.fillStyle = 'rgba(88,166,255,.06)'; ctx.fillRect(10, 10, W - 20, maxH);
        allScores.forEach((v, i) => {
          const x = 10 + i * bw + bw * .1; const h = (v / 100) * maxH; const y = 10 + maxH - h;
          const col = v >= 80 ? '#3fb950' : v >= 60 ? '#d29922' : '#f85149';
          ctx.fillStyle = col + '44'; ctx.fillRect(x, y, bw * .8, h);
          ctx.fillStyle = col; ctx.fillRect(x, y, bw * .8, 3);
          ctx.fillStyle = '#8b949e'; ctx.font = '9px Tajawal'; ctx.textAlign = 'center';
          ctx.fillText(labels[i], x + bw * .4, 130);
          ctx.fillStyle = '#e6edf3'; ctx.font = 'bold 10px Cairo';
          ctx.fillText(v + '%', x + bw * .4, y - 3);
        });
      }, 80);

      const s = DB.users.find(u => u.id === sid); const c = DB.courses.find(c => c.id === cid);
      if (s && !s.courses.includes(cid)) {

      }
      openManage(cid);
    }
    function removeStud(cid, sid) {
      const s = DB.users.find(u => u.id === sid); const c = DB.courses.find(c => c.id === cid);
      if (s) s.courses = s.courses.filter(x => x !== cid);
      if (c) delete c.grades[sid];
      openManage(cid);

    // ═══ ALERTS ═══
    function getSmartAlerts() {
      if (CU.role !== 'doctor') return [];
      const alerts = [];
      myCourses().forEach(c => {
        courseStudents(c.id).forEach(s => {
          const tot = calcTotal(c.id, s.id); const gr = getGr(tot); const g = getG(c.id, s.id); const w = getWarnings(c.id, s.id);
          if (gr.g === 'F' || gr.g === 'D') alerts.push({ type: 'fail', name: s.name, id: s.id, detail: `${c.name} — Total: ${tot}/100` });
          if (w.length) alerts.push({ type: 'warn', name: s.name, id: s.id, detail: `${c.name} — ${w.slice(0, 2).join(', ')}` });
          const qs = g.quizzes?.filter(v => v != null) || [];
          if (qs.length >= 2 && qs[qs.length - 2] > 0 && (qs[qs.length - 2] - qs[qs.length - 1]) / qs[qs.length - 2] > 0.25)
            alerts.push({ type: 'drop', name: s.name, id: s.id, detail: `${c.name} — CE${qs.length - 1}:${qs[qs.length - 2]} → CE${qs.length}:${qs[qs.length - 1]}` });
        });
      });
      return alerts;
    }

      const alerts = getSmartAlerts();

    ${!alerts.length ? '<p style="text-align:center;color:var(--mu);padding:24px">لا توجد تنبيهات 🎉</p>' :
          alerts.map(a => {

  </div>`;
    }

      ${hm.map((mx, i) => {
          const v = g.hws?.[i]; const pct = v != null ? Math.round(v / mx * 100) : null;
          const col = pct != null ? (pct >= 80 ? 'var(--gr)' : pct >= 50 ? 'var(--or)' : 'var(--re)') : 'var(--mu)';
          return `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="font-weight:600">HW${i + 1} <span style="color:var(--mu)">/${mx}</span></span>
          <span style="font-weight:700;color:${col}">${v != null ? v + ' (' + pct + '%)' : 'لم تُدخل'}</span>
        </div><div class="pw"><div class="pb" style="width:${pct ?? 0}%;background:${col}"></div></div></div>`;
        }).join('')}
      <div style="margin-top:10px;padding:10px;background:var(--gl);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Weighted Total</span>
        <span style="font-size:18px;font-weight:900;font-family:Cairo,sans-serif;color:var(--gr)">${weighted}/${sc.hwWeight}</span>
      </div></div>`;
      } else {
        const tot = calcTotal(cid, CU.id); const gr = getGr(tot);
        const qw = calcSection(cid, CU.id, 'quiz'), hw = calcSection(cid, CU.id, 'hw'),
          mw = calcSection(cid, CU.id, 'mid'), pw = calcSection(cid, CU.id, 'proj');
        return `<div style="padding:12px">
      ${[{ lb: 'CE Quizzes', v: qw, max: sc.quizWeight, col: 'var(--cy)' },
            { lb: 'HW', v: hw, max: sc.hwWeight, col: 'var(--gr)' },
            { lb: 'Mid', v: mw, max: sc.midWeight, col: 'var(--or)' },
            { lb: 'Project', v: pw, max: sc.projWeight, col: 'var(--pu)' }
          ].map(it =>
            `<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="font-weight:600">${it.lb}</span><span style="font-weight:700;color:${it.col}">${it.v}/${it.max}</span>
        </div><div class="pw"><div class="pb" style="width:${it.max > 0 ? Math.round(it.v / it.max * 100) : 0}%;background:${it.col}"></div></div></div>`).join('')}
      <div style="margin-top:10px;padding:10px;background:var(--pl);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Total</span>
        <div><span style="font-size:22px;font-weight:900;font-family:Cairo,sans-serif;color:${GC[gr.g]}">${tot}</span>
          <span class="badge ${gr.cls}" style="margin-right:6px">${gr.g}</span></div>
      </div></div>`;
      }
    }

    function updateStudLive(cid) {

    }

    // ═══ RECOMMENDATIONS ENGINE ═══
    function getStudentRecommendations(cid, sid) {
      const c  = DB.courses.find(c => c.id === cid); if (!c) return [];
      const g  = getG(cid, sid);
      const sc = c.schema;
      const qm = qMaxes(sc); const hm = hMaxes(sc);
      const tot  = calcTotal(cid, sid);
      const gr   = getGr(tot);
      const maxP = calcMaxPossible(cid, sid);
      const qSec = calcSection(cid, sid, 'quiz');
      const hSec = calcSection(cid, sid, 'hw');
      const mSec = calcSection(cid, sid, 'mid');
      const pSec = calcSection(cid, sid, 'proj');

      // Percentages per section (how much of the weight they earned)
      const qPct = sc.quizWeight  > 0 ? qSec / sc.quizWeight  : 1;
      const hPct = sc.hwWeight    > 0 ? hSec / sc.hwWeight    : 1;
      const mPct = sc.midWeight   > 0 ? mSec / sc.midWeight   : 1;
      const pPct = sc.projWeight  > 0 ? pSec / sc.projWeight  : 1;

      // Identify weakest CE quiz
      const ceScores = g.quizzes.map((v, i) => v != null ? v / (qm[i] || 5) : null).filter(v => v != null);
      const weakCE   = ceScores.length ? Math.min(...ceScores) : null;
      const weakCEIdx= g.quizzes.findIndex((v, i) => v != null && v / (qm[i] || 5) === weakCE);

      // Absent quizzes
      const absentCE = g.quizzes.map((v, i) => v == null ? `CE${i + 1}` : null).filter(Boolean);

      const recs = [];

      // ── F grade ──────────────────────────────────────────────────────────
      if (gr.g === 'F') {
        recs.push({ icon: '🚨', type: 'danger', title: 'وضعك حرج — تصرف الآن',
          body: `مجموعك الحالي ${tot}/100 وهو في نطاق الرسوب. حتى لو حصلت على أقصى درجة في كل ما تبقى، مجموعك لن يتجاوز ${maxP}. تواصل مع الدكتور في أقرب وقت.` });
        if (absentCE.length)
          recs.push({ icon: '📋', type: 'danger', title: 'غياب في اختبارات',
            body: `لديك غياب في: ${absentCE.join('، ')}. الغياب يعني صفر في هذه الدرجات ويؤثر بشكل كبير على مجموعك. راجع سياسة المادة مع الدكتور.` });
        recs.push({ icon: '📚', type: 'warn', title: 'خطة طوارئ للدراسة',
          body: 'خصص 2 ساعة يومياً على الأقل للمراجعة. ابدأ بالمواضيع الأساسية التي ظهرت في الاختبارات السابقة ولم تتقنها.' });
        recs.push({ icon: '🤝', type: 'info', title: 'اطلب المساعدة',
          body: 'لا تتردد في سؤال الدكتور أو زملائك المتفوقين. الساعات المكتبية للدكتور فرصة لا تفوّتها.' });
      }

      // ── D grade ──────────────────────────────────────────────────────────
      else if (gr.g === 'D') {
        recs.push({ icon: '⚠️', type: 'warn', title: 'أنت قريب من حد النجاح',
          body: `مجموعك ${tot}/100. تحتاج ${60 - tot} نقطة إضافية للوصول إلى C. أقصى ممكن لك: ${maxP}. لا يزال بإمكانك تحسين وضعك.` });
        if (qPct < hPct && qPct < 0.65)
          recs.push({ icon: '📝', type: 'warn', title: 'ركّز على اختبارات CE',
            body: `أداؤك في CE Quizzes أضعف نقاطك (${Math.round(qPct * 100)}% من الوزن المحتمل). راجع ملاحظات المحاضرات وحل أسئلة الدورات السابقة.` });
        if (hPct < 0.6)
          recs.push({ icon: '📓', type: 'warn', title: 'الواجبات تحتاج اهتماماً',
            body: `الواجبات تمثل ${sc.hwWeight}% من مجموعك. سلّم جميع الواجبات حتى لو لم تكن مثالية — الدرجة الجزئية أفضل من الصفر.` });
        recs.push({ icon: '🗓️', type: 'info', title: 'ضع جدولاً أسبوعياً',
          body: 'قسّم وقتك: ساعة للمراجعة اليومية، وركّز على المواضيع الضعيفة قبل الاختبار النصفي.' });
      }

      // ── C grade ──────────────────────────────────────────────────────────
      else if (gr.g === 'C') {
        recs.push({ icon: '👍', type: 'info', title: 'أداء مقبول — يمكنك التحسين',
          body: `مجموعك ${tot}/100. أنت في نطاق C وتحتاج ${80 - tot} نقطة للوصول إلى B. أقصى ممكن: ${maxP}.` });
        const lowest = [['CE Quizzes', qPct], ['HW', hPct], ['Midterm', mPct], ['Project', pPct]]
          .filter(([, p]) => p < 1).sort((a, b) => a[1] - b[1])[0];
        if (lowest)
          recs.push({ icon: '🔍', type: 'info', title: `أضعف نقطة: ${lowest[0]}`,
            body: `حصلت على ${Math.round(lowest[1] * 100)}% من وزن ${lowest[0]}. تحسين هذا الجانب سيرفع مجموعك بشكل ملحوظ.` });
        recs.push({ icon: '🔄', type: 'success', title: 'الاتساق هو المفتاح',
          body: 'حافظ على تسليم الواجبات في وقتها واستعد جيداً لكل اختبار. الثبات في الأداء يصنع الفارق على المدى البعيد.' });
        if (maxP >= 80)
          recs.push({ icon: '🎯', type: 'success', title: 'B في متناولك',
            body: `إذا حصلت على درجات ممتازة في ما تبقى، يمكنك الوصول إلى B (أقصى ممكن: ${maxP}). ركّز على المشروع والاختبار النصفي.` });
      }

      // ── B grade ──────────────────────────────────────────────────────────
      else if (gr.g === 'B') {
        recs.push({ icon: '🌟', type: 'success', title: 'أداء جيد — استمر',
          body: `مجموعك ${tot}/100. أنت في نطاق B وتحتاج ${90 - tot} نقطة للوصول إلى A. أقصى ممكن: ${maxP}.` });
        if (weakCE !== null && weakCE < 0.8 && weakCEIdx >= 0)
          recs.push({ icon: '📝', type: 'info', title: `راجع CE${weakCEIdx + 1}`,
            body: `هذا الاختبار كان أضعف نقاطك (${Math.round(weakCE * 100)}%). راجع المفاهيم التي ظهرت فيه لتتجنب ضعفاً مشابهاً في المستقبل.` });
        if (pPct < 0.85 && g.proj != null)
          recs.push({ icon: '🗂️', type: 'info', title: 'طوّر مستوى مشروعك',
            body: 'المشروع يمثل وزناً كبيراً. راجع تعليقات الدكتور وحسّن جودة عملك للحصول على درجة أعلى.' });
        if (maxP >= 90)
          recs.push({ icon: '🚀', type: 'success', title: 'A في متناولك',
            body: `بأقصى استغلال للفرص المتبقية يمكنك الوصول إلى ${maxP}. ركّز بشكل خاص على المشروع النهائي.` });
        else
          recs.push({ icon: '💪', type: 'info', title: 'حافظ على مستواك',
            body: 'A قد يكون صعب المنال هذا الفصل، لكن B ممتازة. ركّز على تثبيت مجموعك وعدم التراجع.' });
      }

      // ── A grade ──────────────────────────────────────────────────────────
      else if (gr.g === 'A') {
        recs.push({ icon: '🏆', type: 'success', title: 'أداء ممتاز — أنت قريب من القمة',
          body: `مجموعك ${tot}/100. تحتاج فقط ${95 - tot} نقطة إضافية للوصول إلى A+. أقصى ممكن: ${maxP}.` });
        if (maxP >= 95)
          recs.push({ icon: '⭐', type: 'success', title: 'A+ في متناولك',
            body: `إذا أتقنت ما تبقى يمكنك الوصول إلى A+ (أقصى: ${maxP}). لا تتراخَ في المشروع والاختبار النصفي.` });
        else
          recs.push({ icon: '✅', type: 'info', title: 'A+ صعبة لكن A رائعة',
            body: `أقصى ما يمكنك تحقيقه هو ${maxP}. ثبّت مجموعك ولا تخاطر. A تفتح لك أبواباً رائعة.` });
        if (weakCE !== null && weakCE < 0.9)
          recs.push({ icon: '🔬', type: 'info', title: 'صقّل نقاط الضعف الصغيرة',
            body: `CE${weakCEIdx + 1} كان أقل اختباراتك (${Math.round(weakCE * 100)}%). راجع موضوعه لتكون مستعداً لأي سؤال مشابه في النهائي.` });
        recs.push({ icon: '🎓', type: 'success', title: 'شارك خبرتك',
          body: 'مستواك يؤهلك لمساعدة زملائك. تعليم الآخرين يعمّق فهمك أنت أيضاً — فكّر في تكوين مجموعة مذاكرة.' });
      }

      // ── A+ grade ─────────────────────────────────────────────────────────
      else if (gr.g === 'A+') {
        recs.push({ icon: '👑', type: 'success', title: 'أنت في القمة — A+',
          body: `مجموعك ${tot}/100. أداء استثنائي يضعك في أعلى الفصل. حافظ على هذا المستوى حتى نهاية الفصل.` });
        recs.push({ icon: '🔝', type: 'success', title: 'استمر وثبّت مكانتك',
          body: 'لا تتراخَ في الاختبارات القادمة أو المشروع. كثير من الطلاب يبدؤون بقوة ثم يتراجعون — أنت استثناء.' });
        recs.push({ icon: '🤝', type: 'info', title: 'ساعد زملاءك',
          body: 'مستواك المتميز يجعلك مرجعاً لزملائك. المذاكرة الجماعية وشرح المفاهيم يزيدك تمكيناً.' });
        recs.push({ icon: '🌍', type: 'info', title: 'فكّر في الأفق الأبعد',
          body: 'أداؤك يؤهلك للمشاركة في المسابقات الأكاديمية أو البحث العلمي مع الدكتور. استغل هذه الفرصة.' });
        recs.push({ icon: '📈', type: 'success', title: 'المحافظة أصعب من الوصول',
          body: 'الحفاظ على A+ حتى النهاية يتطلب انضباطاً مستمراً. لا تفوّت أي واجب أو اختبار.' });
      }

      return recs;
    }

    function buildRecsPage() {
      const courses = myCourses();
      if (!courses.length) return `<div class="card" style="text-align:center;padding:40px;color:var(--mu)">لا توجد مقررات</div>`;

      const typeStyle = {
        danger:  { bg: 'var(--rl)', border: 'var(--re)',  text: 'var(--re)'  },

      };

      return courses.map(c => {
        const tot  = calcTotal(c.id, CU.id);

        const recs = getStudentRecommendations(c.id, CU.id);
        const maxP = calcMaxPossible(c.id, CU.id);

        return `
      <div class="card" style="margin-bottom:18px">

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;

          <div>
            <div style="font-size:16px;font-weight:900;font-family:Cairo,sans-serif;color:var(--tx)">${c.name}</div>
            <div style="font-size:11px;color:var(--mu);margin-top:2px">توصيات شخصية بناءً على أدائك الفعلي</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:32px;font-weight:900;font-family:Cairo,sans-serif;color:${GC[gr.g]}">${tot}</div>
            <span class="badge ${gr.cls}" style="font-size:12px;padding:4px 12px">${gr.g}</span>
          </div>
        </div>

        <!-- Progress bar -->
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px">
            <span style="color:var(--mu)">المجموع الحالي</span>
            <span style="color:var(--mu)">أقصى ممكن: <b style="color:${GC[gr.g]}">${maxP}</b></span>
          </div>
          <div style="background:var(--bd);border-radius:20px;height:8px;overflow:hidden;position:relative">
            <div style="position:absolute;width:${maxP}%;height:100%;background:${GC[gr.g]}22;border-radius:20px"></div>
            <div style="position:absolute;width:${tot}%;height:100%;background:${GC[gr.g]};border-radius:20px;transition:width .6s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--mu2)">
            ${[60,70,80,90,95].map(t => `<span style="color:${tot>=t?'var(--gr)':'var(--mu2)'}">${t}</span>`).join('')}
          </div>
        </div>

        <!-- Recommendation cards -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          ${recs.map(r => {
            const st = typeStyle[r.type] || typeStyle.info;
            return `<div style="background:${st.bg};border:1.5px solid ${st.border};border-radius:10px;padding:14px">
              <div style="font-size:20px;margin-bottom:6px">${r.icon}</div>
              <div style="font-size:12px;font-weight:700;color:${st.text};margin-bottom:6px">${r.title}</div>
              <div style="font-size:11px;color:var(--tx);line-height:1.6">${r.body}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
      }).join('');
    }
    function buildNotifs() {
      if (!CU) return;

      let alerts = [];

      if (CU.role === 'doctor') {
        alerts = getSmartAlerts().filter(a => a.type === 'fail' || a.type === 'warn');

      } else {
        // ── Student notifications ──────────────────────────────────────────
        myCourses().forEach(c => {
          const tot   = calcTotal(c.id, CU.id);
          const gr    = getGr(tot);
          const w     = getWarnings(c.id, CU.id);
          const maxP  = calcMaxPossible(c.id, CU.id);

          if (gr.g === 'F') {
            alerts.push({
              dot: 'nd-r',
              title: `🚨 خطر الرسوب — ${c.name}`,
              body:  `مجموعك الحالي ${tot}/100. أقصى ممكن: ${maxP}. تواصل مع الدكتور فوراً!`
            });
          } else if (gr.g === 'D') {
            alerts.push({
              dot: 'nd-o',
              title: `⚠️ مستوى منخفض — ${c.name}`,
              body:  `مجموعك ${tot}/100. راجع درجاتك وحسّن أداءك.`
            });
          }

          if (w.length) {
            alerts.push({
              dot: 'nd-o',
              title: `📉 تحذير مبكر — ${c.name}`,
              body:  w.join(' | ')
            });
          }

          // Warn if A+ is no longer reachable
          if (maxP < 95 && gr.g !== 'A+') {
            alerts.push({
              dot: 'nd-o',
              title: `ℹ️ A+ غير متاح — ${c.name}`,
              body:  `أقصى مجموع ممكن هو ${maxP}، لا يكفي للحصول على A+.`
            });
          }
        });
      }

      document.getElementById('NB').textContent = alerts.length;
      document.getElementById('NL').innerHTML = !alerts.length
        ? `<div style="padding:14px;text-align:center;color:var(--mu);font-size:12px">✅ لا توجد تنبيهات</div>`
        : CU.role === 'doctor'
          ? alerts.map(a => `<div class="ni">
              <div class="nd ${a.type === 'fail' ? 'nd-r' : 'nd-o'}"></div>
              <div class="nt"><b>${a.name}</b><br>${a.type === 'fail' ? 'خطر الرسوب' : 'تحذير مبكر'}
                <div style="font-size:10px;color:var(--mu)">${a.detail}</div>
              </div></div>`).join('')
          : alerts.map(a => `<div class="ni">
              <div class="nd ${a.dot}"></div>
              <div class="nt"><b>${a.title}</b>
                <div style="font-size:10px;color:var(--mu);margin-top:2px">${a.body}</div>
              </div></div>`).join('');
    }
    function toggleNotif() { document.getElementById('NP').classList.toggle('open'); }
    document.addEventListener('click', e => {
      const w = document.getElementById('NW');
      if (w && !w.contains(e.target)) document.getElementById('NP').classList.remove('open');
    });

    // ═══ INIT ═══
    pickRole('doctor');
  </script>
</body>

</html>
